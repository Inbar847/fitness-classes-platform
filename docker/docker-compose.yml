services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ../server          # ← זה החשוב!
    restart: always
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ../server:/app        # ← זה החשוב!

  frontend:
    build: ../client          # ← זה החשוב!
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ../client:/app        # ← זה החשוב!
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

volumes:
  postgres_data:

  